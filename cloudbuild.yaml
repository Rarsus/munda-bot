steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/discord-bot:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy'
    args:
      - 'deploy'
      - 'discord-bot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},DISCORD_TOKEN=${_DISCORD_TOKEN},NODE_ENV=production'
      - '--no-allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/discord-bot:latest'
  - 'gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'

# Timeout for build to complete
timeout: '1800s'