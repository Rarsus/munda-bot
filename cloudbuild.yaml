steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'eu.gcr.io/$PROJECT_ID/discord-bot:latest'
      - '-t'
      - 'eu.gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push to Google Container Registry (European region)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'eu.gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run (Netherlands - europe-west4)
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy'
    args:
      - 'deploy'
      - 'discord-bot'
      - '--image'
      - 'eu.gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'
      - '--region'
      - 'europe-west4'
      - '--platform'
      - 'managed'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--execution-environment'
      - 'gen2'
      - '--service-account'
      - 'discord-bot@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--update-secrets'
      - 'DISCORD_TOKEN=DISCORD_TOKEN:latest,DATABASE_URL=DATABASE_URL:latest'
      - '--update-env-vars'
      - 'NODE_ENV=production,LOG_LEVEL=info,GCP_PROJECT_ID=${PROJECT_ID}'
      - '--vpc-connector'
      - 'projects/${PROJECT_ID}/locations/europe-west4/connectors/discord-bot-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--no-allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'

images:
  - 'eu.gcr.io/$PROJECT_ID/discord-bot:latest'
  - 'eu.gcr.io/$PROJECT_ID/discord-bot:$SHORT_SHA'

# Timeout for build to complete
timeout: '1800s'

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'

# Substitutions for easy variable override
substitutions:
  _REGION: 'europe-west4'
  _SERVICE_NAME: 'discord-bot'
  _MEMORY: '512Mi'
  _CPU: '1'